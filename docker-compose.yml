version: "3.8"

services:
  fraudpulse-api:
    build: .
    container_name: fraudpulse_backend
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  fraudpulse-dashboard:
    build: .
    container_name: fraudpulse_ui
    ports:
      - "8501:8501"
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./src:/app/src
      - ./dashboard:/app/dashboard
    environment:
      - PYTHONPATH=/app
    depends_on:
      - fraudpulse-api
    restart: unless-stopped
